version: 2
updates:
  # GitHub Actions: keep the SHA-pinned actions current (Dependabot bumps the
  # SHA and the trailing version comment together).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"

  # Python package dependencies (pyproject.toml / requirements.txt at the root).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "python"

  # Marketing website + docs (Next.js) npm dependencies.
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
    groups:
      npm-dependencies:
        patterns:
          - "*"
        # Keep major bumps OUT of the grouped PR — a single grouped major bump
        # broke the site once (PR #90: next 15->16 + fumadocs 15->16 together,
        # reverted in #116). Majors must be deliberate, individually-tested PRs.
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Next.js + Fumadocs majors require a coordinated migration (Fumadocs v16
      # needs Next 16 + React 19 export-path changes). NOT a Dependabot
      # auto-merge — do these as a dedicated migration PR. See the 2026-05-30
      # #90 break for the rationale.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "fumadocs-core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "fumadocs-ui"
        update-types: ["version-update:semver-major"]
      - dependency-name: "fumadocs-mdx"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "javascript"

  # Docker base images: keep the SHA-pinned `python:3.12-slim` digest current.
  # Dependabot rewrites the digest in Dockerfile and Dockerfile.test when a
  # newer python:3.12-slim is published, preserving the hash-pin required by
  # OpenSSF Scorecard's Pinned-Dependencies check.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
