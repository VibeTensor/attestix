name: SBOM

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cyclonedx:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    # contents: write is required to upload the SBOM as a release asset via
    # the gh CLI when this workflow runs on a published release.
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install package and cyclonedx-bom
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[blockchain]"
          pip install "cyclonedx-bom>=5.0.0,<6.0.0"

      - name: Generate CycloneDX SBOM (JSON)
        run: |
          cyclonedx-py environment --output-format json --output-file attestix-sbom.cyclonedx.json
          echo "SBOM size: $(wc -c < attestix-sbom.cyclonedx.json) bytes"

      - name: Validate SBOM is well-formed JSON
        run: python -c "import json, sys; json.load(open('attestix-sbom.cyclonedx.json')); print('SBOM JSON parsed successfully')"

      - name: Compute SBOM SHA-256
        run: |
          sha256sum attestix-sbom.cyclonedx.json > attestix-sbom.cyclonedx.json.sha256
          cat attestix-sbom.cyclonedx.json.sha256

      - name: Upload SBOM as workflow artefact (30-day retention)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: attestix-sbom-cyclonedx
          path: |
            attestix-sbom.cyclonedx.json
            attestix-sbom.cyclonedx.json.sha256
          retention-days: 30

      - name: Attach SBOM to the GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            attestix-sbom.cyclonedx.json \
            attestix-sbom.cyclonedx.json.sha256 \
            --clobber
